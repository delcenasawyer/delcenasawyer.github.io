<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First Webpage</title>
</head>

<body style="font-family: Arial; background-color: #f4f4f4; text-align: center;">

    <h1>Welcome to My Webpage 🌸</h1>
    <p>This is a beginner-friendly webpage for my assignment!</p>

    <!-- FIRST CLASS (Parent Element #1) -->
    <section class="button-group">
        <h2>Buttons Section</h2>

        <button id="btn1" style="padding:10px; margin:5px;">Click Me</button>
        <button id="btn2" style="padding:10px; margin:5px;">Or Me</button>
    </section>

    <!-- SECOND CLASS (Parent Element #2) -->
    <section class="image-group">
        <h2>Images & Links</h2>

        <!-- Attribute: src -->
        <img id="img1" src="./arrow.png" alt="arrow.png">

        <!-- Attribute: href -->
        <a id="link1" href="https://www.google.com" target="_blank">Visit Google</a>
    </section>

</body>
</html>
